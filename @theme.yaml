# Mr. Mush theme for the current project.
# This file overrides the built-in theme and the global ~/.mrmush/theme.yaml.
# Change only the fields you need; missing values will be inherited.
# After editing, restart mrmush in this project.

# UI colors.
# fg and bg accept hex colors (#aabbcc) or tokens such as cyan, magenta, and whiteBright.
# Available style flags: bold, dim, italic, underline, inverse.
colors:
  primary:
    fg: "#00ff9f"
    bold: true
  ai:
    fg: "#ff6b9d"
  user:
    fg: "#00d4ff"
  success:
    fg: "#39ff14"
  warning:
    fg: "#ffd700"
  accent:
    fg: "#fe53bb"
  dim:
    fg: "#666666"
    dim: true
  muted:
    fg: "#555555"
  border:
    fg: "#333333"
    dim: true
  input:
    fg: "#00ff9f"
  title:
    fg: "#0a0a0a"
    bg: "#fe53bb"
    bold: true

# UI symbols.
# You can change prompt, messageDot, and the frame characters here.
symbols:
  robot: 𓆩
  messageDot: ✦
  pointer: ⚡
  info: ⊙
  tick: ✓
  bullet: ⋆
  divider: ═
  prompt: ⚡
  frame:
    topLeft: ┌
    topRight: ┐
    bottomLeft: └
    bottomRight: ┘
    horizontal: ─
    vertical: │

# Text layout.
# splash contains the mushroom ASCII art.
# maxSuggestions and inputPaddingX affect input UI behavior.
layout:
  agentName: んのむし
  inputPaddingX: 1
  transcriptIndent: " "
  messageIndent: " "
  continuationIndent: "  "
  maxSuggestions: 6
  splashTitle: ✦ んのむし ✦
  splash:
    - ""
    - "        ⣀⣤⣶⣿⣿⣿⣶⣤⣀"
    - "     ⣠⣾⣿⣿⣿⣿⣿⣿⣿⣿⣿⣾⣄"
    - "   ⣰⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣆"
    - "  ⣴⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣦"
    - "  ⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿"
    - "  ⠸⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⠇"
    - "    ⠙⢿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⡿⠋"
    - "      ⠈⠙⠻⠿⠿⠿⠿⠿⠟⠋⠁"
    - ""

# UI animations.
# frames are used for the thinking indicator.
animation:
  frames:
    - ◰
    - ◳
    - ◲
    - ◱
